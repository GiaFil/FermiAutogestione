<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autogestione Fermi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 1rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 2rem;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 0.5rem;
        }

        .event {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding: 1rem 0;
        }

            .event > div {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
            }

            .event:last-child {
                border-bottom: none;
            }

            .event h3 {
                margin: 0;
            }

            .event p {
                margin: 0.3rem 0;
                color: #555;
            }

            .event button {
                padding: 0.5rem 1rem;
                background-color: #4CAF50;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }

                .event button:disabled {
                    background-color: #ccc;
                    cursor: not-allowed;
                }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 2rem;
            border-radius: 8px;
            max-width: 400px;
            position: relative;
            z-index: 1001; /* IMPORTANTE: superiore all'overlay */
        }

        .close {
            position: absolute;
            right: 1rem;
            top: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
        }

        form label {
            margin: 0.5rem 0 0.2rem;
            display: block;
        }

        form input {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
        }

        form button {
            padding: 0.7rem;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
        }

        .status {
            margin-top: 0.5rem;
            font-weight: bold;
            text-align: center;
        }

        .turn-section {
            margin-left: 1rem;
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
        }

        .turn-primo {
            background-color: #e8f5e9;
        }

        .turn-secondo {
            background-color: #e3f2fd;
        }

        .turn-title {
            margin-top: 0;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Autogestione Fermi</h1>
    </header>

    <div class="container">

        <div id="event-list"></div>

        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h3>Compila i tuoi dati</h3>
                <form id="registration-form">
                    <label>Nome</label>
                    <input type="text" id="nome" required>
                    <label>Cognome</label>
                    <input type="text" id="cognome" required>
                    <label>Classe</label>
                    <input type="text" id="classe" required>
                    <button type="submit">Iscriviti</button>
                </form>
                <div id="modal-status" class="status"></div> <!-- qui mostri gli errori -->
            </div>
        </div>

        <div id="confirmation" class="status"></div>

    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://oshlsztqzlxikdrmhkde.supabase.co';
        const supabaseKey = 'sb_publishable_KhG9adzEibpiORc73NGFdA_Rl8Iqju4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let events = [];
        const eventList = document.getElementById('event-list');
        const modal = document.getElementById('modal');
        const form = document.getElementById('registration-form');
        const confirmation = document.getElementById('confirmation');
        let selectedEvent = null;

        async function loadEvents() {
            const { data, error } = await supabaseClient.from('events').select('*');
            if (error) { console.error(error); return; }
            events = data.map(e => ({ ...e, remaining: e.remaining ?? e.max_seats }));
            renderEvents();
        }

        function renderEvents() {
            eventList.innerHTML = '';
            const groupedByDate = {};

            events.forEach(e => {
                if (!groupedByDate[e.date]) groupedByDate[e.date] = { primo: [], secondo: [] };
                if (e.turn === 'primo') groupedByDate[e.date].primo.push(e);
                else groupedByDate[e.date].secondo.push(e);
            });

            // Ottieni le date ordinate
            const orderedDates = Object.keys(groupedByDate).sort((a, b) => new Date(a) - new Date(b));

            orderedDates.forEach(date => {
                const dateSection = document.createElement('div');
                dateSection.innerHTML = `<h2>${formatDate(date)}</h2>`;

                if (groupedByDate[date].primo.length > 0) {
                    const primoSection = document.createElement('div');
                    primoSection.className = 'turn-section turn-primo';
                    const primoTitle = document.createElement('h3');
                    primoTitle.className = 'turn-title';
                    primoTitle.textContent = 'Primo turno';
                    primoSection.appendChild(primoTitle);
                    groupedByDate[date].primo.forEach(e => primoSection.appendChild(createEventElement(e)));
                    dateSection.appendChild(primoSection);
                }

                if (groupedByDate[date].secondo.length > 0) {
                    const secondoSection = document.createElement('div');
                    secondoSection.className = 'turn-section turn-secondo';
                    const secondoTitle = document.createElement('h3');
                    secondoTitle.className = 'turn-title';
                    secondoTitle.textContent = 'Secondo turno';
                    secondoSection.appendChild(secondoTitle);
                    groupedByDate[date].secondo.forEach(e => secondoSection.appendChild(createEventElement(e)));
                    dateSection.appendChild(secondoSection);
                }

                eventList.appendChild(dateSection);
            });
        }

        function createEventElement(e) {
            const div = document.createElement('div');
            div.className = 'event';
            div.innerHTML = `
            <div>
                <h3>${e.title}</h3>
                <p>${e.description || ''}</p>
                <div class="status">Posti rimanenti: ${e.remaining}</div>
            </div>
            <button ${e.remaining === 0 ? 'disabled' : ''} onclick="openModal(${e.id})">Iscriviti</button>
        `;
            return div;
        }

        function formatDate(date) {
            const mesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
            const d = new Date(date);
            return `${d.getDate()} ${mesi[d.getMonth()]}`;
        }

        function openModal(id) {
            selectedEvent = events.find(e => e.id === id);
            modal.style.display = 'block';
            confirmation.textContent = '';
        }

        function closeModal() {
            modal.style.display = 'none';
            form.reset();
        }

        window.onclick = function (event) {
            if (event.target === modal) closeModal();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('nome').value;
            const cognome = document.getElementById('cognome').value;
            const classe = document.getElementById('classe').value;

            const modalStatus = document.getElementById('modal-status');
            modalStatus.textContent = ''; // reset messaggio

            if (selectedEvent.remaining > 0) {
                // Inserimento utente
                const { data: user, error: userError } = await supabaseClient
                    .from('users')
                    .insert([{ nome, cognome, classe }])
                    .select('id')
                    .single();

                if (userError) {
                    console.error('Errore inserimento utente:', userError);
                    modalStatus.textContent = 'Errore nella registrazione. Riprova.';
                    return;
                }

                // Inserimento registrazione
                const { error: regError } = await supabaseClient
                    .from('registrations')
                    .insert([{ user_id: user.id, event_id: selectedEvent.id }]);

                if (regError) {
                    console.error('Errore registrazione evento:', regError);
                    modalStatus.textContent = 'Errore nella registrazione. Riprova.';
                    return;
                }

                // Aggiornamento posti
                const { error: updateError } = await supabaseClient
                    .from('events')
                    .update({ remaining: selectedEvent.remaining - 1 })
                    .eq('id', selectedEvent.id);

                if (updateError) {
                    console.error('Errore aggiornamento posti:', updateError);
                    modalStatus.textContent = 'Errore nella registrazione. Riprova.';
                    return;
                }

                // Tutto ok
                selectedEvent.remaining -= 1;
                renderEvents();
                modalStatus.textContent = `Iscrizione confermata a "${selectedEvent.title}"!`;
                // chiudi automaticamente se vuoi, o lascia aperto
                setTimeout(closeModal, 1500);
            } else {
                modalStatus.textContent = `Posti esauriti per "${selectedEvent.title}"`;
            }
        });

        loadEvents();
    </script>

</body>
</html>
