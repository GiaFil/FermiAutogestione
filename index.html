<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autogestione Fermi</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
        }

        header {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 1rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
        }

        .event {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid #ddd;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }

            button:disabled {
                background: #ccc;
            }

        .turn-section {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
        }

        .turn-primo {
            background: #e8f5e9;
        }

        .turn-secondo {
            background: #e3f2fd;
        }

        .status {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            top: 0;
            left: 0;
        }

        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 2rem;
            max-width: 400px;
            border-radius: 8px;
            position: relative;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header><h1>Autogestione Fermi</h1></header>

    <div class="container">
        <div id="event-list"></div>

        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h3>Inserisci dati</h3>
                <form id="registration-form">
                    <input id="nome" placeholder="Nome" required>
                    <input id="cognome" placeholder="Cognome" required>
                    <input id="classe" placeholder="Classe" required>
                    <button type="submit">Iscriviti</button>
                </form>
                <div id="modal-status" class="status"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        console.log("Script caricato");

        const supabaseClient = window.supabase.createClient(
            'https://oshlsztqzlxikdrmhkde.supabase.co',
            'sb_publishable_KhG9adzEibpiORc73NGFdA_Rl8Iqju4'
        );

        let events = [];
        let selectedEvent = null;
        const modal = document.getElementById('modal');
        const form = document.getElementById('registration-form');
        const statusBox = document.getElementById('modal-status');

        function debug(msg, obj = null) {
            console.log(msg, obj || '');
        }

        // Carica eventi da Supabase
        async function loadEvents() {
            const { data, error } = await supabaseClient
                .from('events')
                .select('*')
                .order('date', { ascending: true });

            if (error) {
                debug("Errore caricamento eventi", error);
                return;
            }

            events = data;
            debug("Eventi caricati", events);
            renderEvents();
        }

        function renderEvents() {
            const container = document.getElementById('event-list');
            container.innerHTML = '';

            const grouped = {};
            events.forEach(e => {
                if (!grouped[e.date]) grouped[e.date] = { primo: [], secondo: [] };
                grouped[e.date][e.turn].push(e);
            });

            Object.keys(grouped).forEach(date => {
                const div = document.createElement('div');
                div.innerHTML = `<h2>${date}</h2>`;

                ['primo', 'secondo'].forEach(turn => {
                    if (grouped[date][turn].length) {
                        const sec = document.createElement('div');
                        sec.className = 'turn-section ' + (turn === 'primo' ? 'turn-primo' : 'turn-secondo');
                        sec.innerHTML = `<h3>${turn}</h3>`;

                        grouped[date][turn].forEach(e => {
                            const el = document.createElement('div');
                            el.className = 'event';
                            el.innerHTML = `
                            <div>
                                <strong>${e.title}</strong><br>
                                <small>${e.description || ''}</small>
                            </div>
                            <button onclick="openModal(${e.id})">Iscriviti</button>
                            `;
                            sec.appendChild(el);
                        });

                        div.appendChild(sec);
                    }
                });

                container.appendChild(div);
            });

            debug("Eventi renderizzati");
        }

        function openModal(id) {
            selectedEvent = events.find(e => e.id === id);
            debug("Modal aperto per evento", selectedEvent);
            statusBox.textContent = '';
            modal.style.display = 'block';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        window.onclick = function (event) {
            if (event.target == modal) closeModal();
        }
        window.openModal = openModal;

        form.onsubmit = async function (e) {
            e.preventDefault();
            const btn = form.querySelector('button');
            btn.disabled = true;
            statusBox.textContent = '';

            const nome = document.getElementById('nome').value.trim().toLowerCase();
            const cognome = document.getElementById('cognome').value.trim().toLowerCase();
            const classe = document.getElementById('classe').value.trim().toLowerCase();

            debug("Submit form", { nome, cognome, classe, evento: selectedEvent });

            // 1. Trova o crea utente
            let userId;
            const { data: u, error: userErr } = await supabaseClient
                .from('users')
                .select('*')
                .eq('nome', nome)
                .eq('cognome', cognome)
                .eq('classe', classe)
                .maybeSingle();

            if (userErr) {
                statusBox.textContent = 'Errore utente';
                debug("Errore utente", userErr);
                btn.disabled = false;
                return;
            }

            if (u) userId = u.id;
            else {
                const { data: newU, error: insertErr } = await supabaseClient
                    .from('users')
                    .insert([{ nome, cognome, classe }])
                    .select()
                    .single();

                if (insertErr) {
                    statusBox.textContent = 'Errore creazione utente';
                    debug("Errore inserimento utente", insertErr);
                    btn.disabled = false;
                    return;
                }
                userId = newU.id;
            }

            // 2. Prova a inserire la registrazione
            const { error: insertRegErr } = await supabaseClient
                .from('registrations')
                .insert([{
                    user_id: userId,
                    event_id: selectedEvent.id,
                    event_date: selectedEvent.date,
                    turn: selectedEvent.turn
                }]);

            if (insertRegErr) {
                // 23505 = violation della unique constraint
                if (insertRegErr.code === '23505') {
                    statusBox.textContent = 'Errore: sei già iscritto a un evento in questo turno';
                } else {
                    statusBox.textContent = 'Errore registrazione';
                }
                debug("Errore registrazione", insertRegErr);
                btn.disabled = false;
                return;
            }

            statusBox.textContent = 'Iscrizione completata!';
            debug("Registrazione completata", { userId, eventId: selectedEvent.id });
            setTimeout(() => location.reload(), 1000);
        };

        loadEvents();
    </script>

</body>
</html>
