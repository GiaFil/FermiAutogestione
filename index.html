<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autogestione Fermi</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
        }

        header {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 1rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
        }

        .event {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid #ddd;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }

            button:disabled {
                background: #ccc;
            }

        .turn-section {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
        }

        .turn-primo {
            background: #e8f5e9;
        }

        .turn-secondo {
            background: #e3f2fd;
        }

        .status {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: white;
            margin: auto;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            position: relative;
            top: 50%;
            transform: translateY(-50%) scale(0.95);
            animation: popIn 0.2s ease forwards;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

            .modal-content h3 {
                margin-bottom: 1rem;
                text-align: center;
            }

        #registration-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

            #registration-form input, #registration-form select {
                padding: 10px;
                border-radius: 6px;
                border: 1px solid #ccc;
                font-size: 14px;
                transition: 0.2s;
            }

                #registration-form input:focus, #registration-form select:focus {
                    border-color: #4CAF50;
                    outline: none;
                    box-shadow: 0 0 0 2px rgba(76,175,80,0.2);
                }

            #registration-form button {
                margin-top: 10px;
                padding: 10px;
                border-radius: 6px;
                font-weight: bold;
                transition: 0.2s;
            }

                #registration-form button:disabled {
                    background: #ccc;
                    cursor: not-allowed;
                }

        .close {
            position: absolute;
            top: 12px;
            right: 15px;
            cursor: pointer;
            font-size: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes popIn {
            to {
                transform: translateY(-50%) scale(1);
            }
        }
    </style>
</head>
<body>

    <header><h1>Autogestione Fermi</h1></header>
    <div class="container">
        <div id="event-list"></div>

        <!-- Modal Registrazione -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h3 id="modal-title">Inserisci dati</h3>
                <form id="registration-form">
                    <input id="nome" placeholder="Nome" required>
                    <input id="cognome" placeholder="Cognome" required>
                    <select id="classe" required>
                        <option value="">Seleziona classe</option>
                        <option>1A</option>
                        <option>1ASA</option>
                        <option>1B</option>
                        <option>1BSA</option>
                        <option>1C</option>
                        <option>1CSA</option>
                        <option>1D</option>
                        <option>2A</option>
                        <option>2ASA</option>
                        <option>2B</option>
                        <option>2BSA</option>
                        <option>2C</option>
                        <option>2CSA</option>
                        <option>3A</option>
                        <option>3ASA</option>
                        <option>3B</option>
                        <option>3BSA</option>
                        <option>3C</option>
                        <option>3D</option>
                        <option>3E</option>
                        <option>4A</option>
                        <option>4ASA</option>
                        <option>4B</option>
                        <option>4BSA</option>
                        <option>4C</option>
                        <option>4D</option>
                        <option>4E</option>
                        <option>5A</option>
                        <option>5ASA</option>
                        <option>5B</option>
                        <option>5BSA</option>
                        <option>5C</option>
                        <option>5D</option>
                        <option>5E</option>
                    </select>
                    <button type="submit" disabled>Iscriviti</button>
                </form>
                <div id="modal-status" class="status"></div>
            </div>
        </div>

        <!-- Modal Conferma Sostituzione -->
        <div id="confirm-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeConfirmModal()">&times;</span>
                <h3>Conferma sostituzione</h3>
                <p id="confirm-text">Sei già iscritto in questo turno, sostituire iscrizione a TITOLO.VECCHIO con TITOLO.NUOVO?</p>
                <div style="text-align:center; margin-top:1rem;">
                    <button onclick="replaceRegistration(false)">NO</button>
                    <button onclick="replaceRegistration(true)">SI</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = window.supabase.createClient(
            'https://oshlsztqzlxikdrmhkde.supabase.co',
            'sb_publishable_KhG9adzEibpiORc73NGFdA_Rl8Iqju4'
        );

        let events = [], selectedEvent = null, pendingRegistration = null;

        const modal = document.getElementById('modal');
        const confirmModal = document.getElementById('confirm-modal');
        const form = document.getElementById('registration-form');
        const statusBox = document.getElementById('modal-status');

        const inputs = form.querySelectorAll('input, select');
        const submitBtn = form.querySelector('button');

        window.addEventListener('DOMContentLoaded', () => {
            const nome = localStorage.getItem('nome');
            const cognome = localStorage.getItem('cognome');
            const classe = localStorage.getItem('classe');

            if (nome) document.getElementById('nome').value = nome;
            if (cognome) document.getElementById('cognome').value = cognome;
            if (classe) document.getElementById('classe').value = classe;

            checkForm(); // aggiorna stato bottone
        });

        inputs.forEach(i => i.addEventListener('input', checkForm));
        function checkForm() { submitBtn.disabled = ![...inputs].every(i => i.value.trim() !== ''); }

        async function loadEvents() {
            const { data } = await supabaseClient.from('events').select('*').order('date');
            events = data || [];
            renderEvents();
        }

        function renderEvents() {
            const container = document.getElementById('event-list');
            container.innerHTML = '';
            const grouped = {};
            events.forEach(e => { if (!grouped[e.date]) grouped[e.date] = { primo: [], secondo: [] }; grouped[e.date][e.turn].push(e); });

            Object.keys(grouped).forEach(date => {
                const div = document.createElement('div');
                const formattedDate = new Date(date).toLocaleDateString('it-IT', { day: 'numeric', month: 'long' });
                div.innerHTML = `<h2>${formattedDate}</h2>`;
                ['primo', 'secondo'].forEach(turn => {
                    if (grouped[date][turn].length) {
                        const sec = document.createElement('div');
                        sec.className = 'turn-section ' + (turn === 'primo' ? 'turn-primo' : 'turn-secondo');
                        sec.innerHTML = `<h3>${turn} turno</h3>`;
                        grouped[date][turn].forEach(e => {
                            const el = document.createElement('div');
                            el.className = 'event';
                            el.innerHTML = `<div>
                                <strong>${e.title}</strong><br>
                                <small>${e.description || ''}</small><br>
                                <small style="color:${e.remaining > 0 ? 'green' : 'red'}">Posti rimasti: ${e.remaining}</small>
                            </div>
                            <button onclick="openModal(${e.id})" ${e.remaining <= 0 ? 'disabled' : ''}>${e.remaining <= 0 ? 'Pieno' : 'Iscriviti'}</button>`;
                            sec.appendChild(el);
                        });
                        div.appendChild(sec);
                    }
                });
                container.appendChild(div);
            });
        }

        function openModal(id) {
            selectedEvent = events.find(e => e.id === id);
            document.getElementById('modal-title').textContent = `${selectedEvent.title} - ${selectedEvent.turn} turno`;
            statusBox.textContent = '';

            document.getElementById('nome').value = localStorage.getItem('nome') || '';
            document.getElementById('cognome').value = localStorage.getItem('cognome') || '';
            document.getElementById('classe').value = localStorage.getItem('classe') || '';

            checkForm();

            modal.style.display = 'block';


        }
        function closeModal() { modal.style.display = 'none'; }

        function openConfirmModal(oldTitle, newTitle, registration) {
            document.getElementById('confirm-text').textContent = `Sei già iscritto in questo turno, sostituire iscrizione a ${oldTitle} con ${newTitle}?`;
            pendingRegistration = registration;
            confirmModal.style.display = 'block';
        }
        function closeConfirmModal() { confirmModal.style.display = 'none'; pendingRegistration = null; }

        window.onclick = function (event) {
            if (event.target == modal) closeModal();
            if (event.target == confirmModal) closeConfirmModal();
        }

        window.openModal = openModal;

        form.onsubmit = async function (e) {
            e.preventDefault();
            submitBtn.disabled = true;

            const nome = document.getElementById('nome').value.trim().toLowerCase();
            const cognome = document.getElementById('cognome').value.trim().toLowerCase();
            const classe = document.getElementById('classe').value.trim();

            localStorage.setItem('nome', nome);
            localStorage.setItem('cognome', cognome);
            localStorage.setItem('classe', classe);

            let { data: u } = await supabaseClient
                .from('users')
                .select('*')
                .eq('nome', nome)
                .eq('cognome', cognome)
                .eq('classe', classe).maybeSingle();
            let userId = u ? u.id : (await supabaseClient.from('users').insert([{ nome, cognome, classe }]).select().single()).data.id;

            // Controlla registrazioni esistenti nello stesso turno
            const { data: existing } = await supabaseClient.from('registrations')
                .select('id,event_id')
                .eq('user_id', userId)
                .eq('turn', selectedEvent.turn)
                .eq('event_date', selectedEvent.date)
                .maybeSingle();

            if (existing && existing.event_id === selectedEvent.id) {
                statusBox.textContent = 'Sei già iscritto a questo corso';
                submitBtn.disabled = false;
                return;
            }

            if (existing) {
                const oldEvent = events.find(e => e.id === existing.event_id);
                openConfirmModal(oldEvent.title, selectedEvent.title, { userId, existingId: existing.id, oldEventId: oldEvent.id, newEventId: selectedEvent.id });
                submitBtn.disabled = false;
                return;
            }

            // Inserimento nuovo
            const { error } = await supabaseClient.from('registrations').insert([{
                user_id: userId,
                event_id: selectedEvent.id,
                event_date: selectedEvent.date,
                turn: selectedEvent.turn
            }]);

            if (error) {
                statusBox.textContent = 'Errore registrazione';
                submitBtn.disabled = false;
                return;
            }

            await supabaseClient.from('events').update({ remaining: selectedEvent.remaining - 1 }).eq('id', selectedEvent.id);
            statusBox.textContent = 'Iscrizione completata!';
            setTimeout(() => location.reload(), 1000);
        }

        // Sostituzione registrazione con update + gestione posti
        async function replaceRegistration(confirm) {
            if (!confirm || !pendingRegistration) { closeConfirmModal(); return; }

            // Aggiorna la registrazione esistente
            await supabaseClient.from('registrations')
                .update({
                    event_id: pendingRegistration.newEventId,
                    event_date: selectedEvent.date,
                    created_at: new Date().toISOString()
                })
                .eq('id', pendingRegistration.existingId);

            // Aggiorna posti
            await supabaseClient.from('events').update({ remaining: events.find(e => e.id === pendingRegistration.oldEventId).remaining + 1 }).eq('id', pendingRegistration.oldEventId);
            await supabaseClient.from('events').update({ remaining: selectedEvent.remaining - 1 }).eq('id', selectedEvent.id);

            statusBox.textContent = 'Iscrizione sostituita!';
            closeConfirmModal();
            closeModal();
            setTimeout(() => location.reload(), 1000);
        }

        loadEvents();
    </script>
</body>
</html>
