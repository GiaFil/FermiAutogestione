<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autogestione Fermi</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
        }

        header {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 1rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
        }

        .event {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid #ddd;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            height: 40px;
            align-self: center;
        }
        @media (max-width: 600px) {
            button {
                height: 48px;
                font-size: 16px;
            }
        }

            button:disabled {
                background: #ccc;
            }

        .turn-section {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
        }

        .turn-primo {
            background: #e8f5e9;
        }

        .turn-secondo {
            background: #e3f2fd;
        }

        .status {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: white;
            margin: auto;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            position: relative;
            top: 50%;
            transform: translateY(-50%) scale(0.95);
            animation: popIn 0.2s ease forwards;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

            .modal-content h3 {
                margin-bottom: 1rem;
                text-align: center;
            }

        #registration-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

            #registration-form input, #registration-form select {
                padding: 10px;
                border-radius: 6px;
                border: 1px solid #ccc;
                font-size: 14px;
                transition: 0.2s;
            }

                #registration-form input:focus, #registration-form select:focus {
                    border-color: #4CAF50;
                    outline: none;
                    box-shadow: 0 0 0 2px rgba(76,175,80,0.2);
                }

            #registration-form button {
                margin-top: 10px;
                padding: 10px;
                border-radius: 6px;
                font-weight: bold;
                transition: 0.2s;
            }

                #registration-form button:disabled {
                    background: #ccc;
                    cursor: not-allowed;
                }

        .close {
            position: absolute;
            top: 12px;
            right: 15px;
            cursor: pointer;
            font-size: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes popIn {
            to {
                transform: translateY(-50%) scale(1);
            }
        }
    </style>
</head>
<body>

    <header><h1>Autogestione Fermi</h1></header>
    <h1>tempo di fare una pausa ragazzi</h1>
</body>
</html>
